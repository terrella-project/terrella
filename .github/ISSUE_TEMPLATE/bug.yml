name: Bug
description: Report a bug or unexpected behavior
title: "[Bug]: "
type: Bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Platform (Fedora / Ubuntu / WSL / macOS client):
        - earth-ai commit / earthai version:
        - podman version:
        - GPU / driver (if relevant):
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (journalctl, podman logs, CLI output). Automatically formatted, no backticks needed.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched for similar issues and confirmed this is not a duplicate
        - label: I have included logs, environment, and steps to reproduce
