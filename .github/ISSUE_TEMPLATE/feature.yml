name: Feature
description: Suggest a new feature or enhancement
title: "[Feature]: "
type: Feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What pain point does this address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: A concrete example of how this feature would be used.
    validations:
      required: false
  - type: checkboxes
    id: alignment
    attributes:
      label: Checklist
      options:
        - label: This aligns with the roadmap and principles in ROADMAP.md
        - label: I've considered the config-in/artifacts-out principle (ADR-0006) — no new hand-edited runtime files
