name: Labeler

# Applies `component:*` labels to PRs from changed file paths.
# Mapping lives in .github/labeler.yml; see docs/project-management.md.

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
        with:
          sync-labels: false
