name: Labeler

# Applies `component:*` labels to PRs from changed file paths.
# Mapping lives in .github/labeler.yml; see docs/project-management.md.

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          sync-labels: false
