name: Labeler

# Applies `component:*` labels to PRs from changed file paths.
# Mapping lives in .github/labeler.yml; see docs/project-management.md.

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          sync-labels: false
