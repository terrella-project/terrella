# Open WebUI — chat UI in front of ollama (and optionally cloud providers).
# Intended host: Earth-AI WSL on machine `earth`.
#
# 'name: earth-ai' pins the docker-compose project name so volumes and
# containers keep the existing 'earth-ai_*' prefix from when this file
# lived at the repo root. Don't change it without migrating the volume.

name: earth-ai

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    network_mode: host
    volumes:
      - open-webui:/app/backend/data
    environment:
      - 'OLLAMA_BASE_URL=http://127.0.0.1:11434'

volumes:
  open-webui:
