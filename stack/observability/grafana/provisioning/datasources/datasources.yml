apiVersion: 1

datasources:
  - name: Prometheus
    uid: "prometheus"
    type: prometheus
    access: proxy
    # Grafana uses network_mode: host, so localhost reaches the host directly.
    url: http://localhost:9090
    isDefault: true
    jsonData:
      timeInterval: 30s

  - name: LiteLLM-Postgres
    uid: "LiteLLM-Postgres"
    type: postgres
    access: proxy
    url: localhost:5433
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
