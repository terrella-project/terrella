apiVersion: 1

datasources:
  - name: Prometheus
    uid: "prometheus"
    type: prometheus
    access: proxy
    # Grafana runs in default bridge networking, so reach Prometheus on the host.
    # On Linux/WSL, host.docker.internal needs the extra_hosts entry — easier to
    # use the host gateway alias which docker provides automatically.
    url: http://host.docker.internal:9090
    isDefault: true
    jsonData:
      timeInterval: 30s

  - name: LiteLLM-Postgres
    uid: "LiteLLM-Postgres"
    type: postgres
    access: proxy
    url: host.docker.internal:5433
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
