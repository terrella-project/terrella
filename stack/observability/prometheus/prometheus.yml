global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: litellm_exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:11436"]

  - job_name: ollama_exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:11435"]
