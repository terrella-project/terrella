litellm_settings:
  # Drop unsupported params silently (e.g. when ollama doesn't accept some OpenAI fields).
  drop_params: True
  # Track real spend per call (LiteLLM has built-in pricing for Anthropic / Gemini / OpenAI).
  set_verbose: False
  # Per-call logs are persisted to Postgres automatically via database_url in general_settings.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Health probes hit ollama and providers periodically.
  background_health_checks: True
  health_check_interval: 300

# Virtual API keys are NOT stored here — create them via the admin UI at
# http://localhost:4000/ui (sign in with master_key) and persist to the DB.
# Suggested keys:
#   sk-machine-earth-ubuntu24      (this WSL)
#   sk-machine-earth-ai             (Earth-AI WSL)
#   sk-machine-laptop
#   sk-machine-mac-mini
#   sk-tool-agent-runner            (CI / automation scripts)
#   sk-tool-opencode
#   sk-tool-continue                (editor inline completions)
# Each key can have its own monthly spend cap and rate limit.
