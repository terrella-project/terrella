# LiteLLM proxy config.
# Docs: https://docs.litellm.ai/docs/proxy/configs
# After changing this file: docker compose restart litellm

model_list:
  # ── Anthropic ────────────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Google Gemini ────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── OpenAI ───────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # ── Local: ollama on the host ───────────────────────────────────────────
  # LiteLLM runs with network_mode: host, so 127.0.0.1 is the host's localhost
  # which is where ollama listens (port 11434).
  - model_name: ollama/qwen2.5-coder-14b
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://127.0.0.1:11434
  - model_name: ollama/qwen2.5-coder-32b
    litellm_params:
      model: ollama/qwen2.5-coder:32b
      api_base: http://127.0.0.1:11434
  - model_name: ollama/qwen2.5-coder-1.5b
    litellm_params:
      model: ollama/qwen2.5-coder:1.5b
      api_base: http://127.0.0.1:11434
  - model_name: ollama/deepseek-r1-14b
    litellm_params:
      model: ollama/deepseek-r1:14b
      api_base: http://127.0.0.1:11434
  - model_name: ollama/gemma2-9b
    litellm_params:
      model: ollama/gemma2:9b
      api_base: http://127.0.0.1:11434
  - model_name: ollama/nomic-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://127.0.0.1:11434

litellm_settings:
  # Drop unsupported params silently (e.g. when ollama doesn't accept some OpenAI fields).
  drop_params: True
  # Track real spend per call (LiteLLM has built-in pricing for Anthropic / Gemini / OpenAI).
  set_verbose: False
  # Per-call logs are persisted to Postgres automatically via database_url in general_settings.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Health probes hit ollama and providers periodically.
  background_health_checks: True
  health_check_interval: 300

# Virtual API keys are NOT stored here — create them via the admin UI at
# http://localhost:4000/ui (sign in with master_key) and persist to the DB.
# Suggested keys:
#   sk-machine-earth-ubuntu24      (this WSL)
#   sk-machine-earth-ai             (Earth-AI WSL)
#   sk-machine-laptop
#   sk-machine-mac-mini
#   sk-tool-agent-runner            (TrackPro CI)
#   sk-tool-opencode
#   sk-tool-continue                (editor inline completions)
# Each key can have its own monthly spend cap and rate limit.
