# LiteLLM proxy config.
# Docs: https://docs.litellm.ai/docs/proxy/configs
# After changing this file: docker compose restart litellm

litellm_settings:
  # Drop unsupported params silently (e.g. when ollama doesn't accept some OpenAI fields).
  drop_params: True
  # Track real spend per call (LiteLLM has built-in pricing for Anthropic / Gemini / OpenAI).
  set_verbose: True

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # OFF: background health checks send a real, billable completion request to
  # every model in model_list each interval (~60 paid calls per cycle).
  # Liveness monitoring uses /health/liveness (litellm_exporter.py), which makes
  # no model calls. Avoid GET /health as well — with background checks off it
  # live-probes every model on demand.
  background_health_checks: False

teams:

  # Track Pro
  - team_id: "85a9216a-a85a-435f-9dff-f704537cfc06"  
    models: [] # empty list is "all models"

# If a call fails, return the *real* error instead of trying to call OpenAI.
fallbacks: []

