  # ── Local: ollama on the host ───────────────────────────────────────────
  # LiteLLM runs with network_mode: host, so 127.0.0.1 is the host's localhost
  # which is where ollama listens (port 11434).
  # Preferred aliases stay manual; the full installed catalog below is managed.
  - model_name: ollama/qwen2.5-coder-32b-q2
    litellm_params:
      model: ollama/qwen2.5-coder:32b-instruct-q2_K
      api_base: http://127.0.0.1:11434
  - model_name: ollama/nomic-embed
    litellm_params:
      model: ollama/nomic-embed-text:latest
      api_base: http://127.0.0.1:11434
