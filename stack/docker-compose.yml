# Earth AI services — Open WebUI + LiteLLM proxy + Postgres + Prometheus + Grafana.
# Intended host: Earth-AI WSL on machine `earth`.
# Ollama runs outside this stack (Phase 3), on the host's WSL distro.
# All Postgres/Grafana ports bind to 127.0.0.1 — cross-machine access is via Tailscale.

name: earth-ai

services:

  # ── Human-facing chat UI ──────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    network_mode: host
    volumes:
      - open-webui:/app/backend/data
    environment:
      - 'OLLAMA_BASE_URL=http://127.0.0.1:11434'
      # Pre-register the GitHub MCP SSE server so it appears in Tools without manual UI setup.
      - 'TOOL_SERVER_CONNECTIONS=[{"url":"http://127.0.0.1:8765/sse","name":"GitHub","description":"GitHub MCP — repos, issues, PRs, code search"}]'

  # ── API proxy + cost logging ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Use host networking so LiteLLM can reach ollama on localhost:11434
    # (ollama runs outside this compose project, on the host's WSL distro).
    network_mode: host
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5433/${POSTGRES_DB}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      STORE_MODEL_IN_DB: "True"
      # Backend provider keys — read from .env (generated by scripts/generate-env.sh).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./observability/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--telemetry", "False"]

  # ── GitHub MCP tool server ───────────────────────────────────────────────
  github-mcp:
    image: ghcr.io/github/github-mcp-server
    container_name: github-mcp
    restart: always
    network_mode: host
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PAT}
    command: ["--transport", "sse", "--port", "8765"]

  # ── Metrics + dashboards ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.listen-address=127.0.0.1:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
      - postgres
    # Host networking lets Grafana reach Postgres (127.0.0.1:5433) and
    # Prometheus (127.0.0.1:9090) directly without bridge NAT.
    # Grafana listens on :3000 on all interfaces via the host network stack.
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: ""
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Postgres datasource credentials (consumed by provisioning yaml via env vars).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana:/var/lib/grafana

volumes:
  open-webui:
